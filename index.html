                <style>
                    * { 
                        font-size: 16px;
                    }
                </style>

                 About this website:  <br />
                 <br /> All elements and styles are coded by hand, <br />
                 i.e. <b> no CSS frameworks like Tailwind or Bootstrap used</b>. <br />
                 <br /> Except for this "Alert" window
                 (which is much better than the default one, isn't it?), <br />
                 everything else is implemented with <b>Vanilla JavaScript</b>. <br />
                 <br /> My purpose in doing so was to demonstrate that I am familiar with the fundamentals. <br />
                 <b> I am open to learning and using new techniques/frameworks/languages. </b>
                 <br /> <br /> <hr /> <br />
                 About the games:  <br/> <br />
                 Games with a star mark (*) following their names indicate that the <b>Platinum Trophy</b> has been obtained. <br />

        });
